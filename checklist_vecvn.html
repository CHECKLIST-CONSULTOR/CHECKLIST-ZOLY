<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checklist de Processos Implantados</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f5f5f5; margin: 0; padding: 0; }
        header { background-color: #007bff; color: white; text-align: center; padding: 15px 0; }
        h2 { color: #333; text-align: center; margin-top: 20px; }
        .container { max-width: 900px; margin: 20px auto; padding: 20px; background-color: white; border-radius: 8px; box-shadow: 0 0 15px rgba(0, 0, 0, 0.1); }
        .dados-cliente { display: flex; flex-direction: column; gap: 10px; margin-bottom: 25px; }
        .linha { display: flex; gap: 20px; }
        .dados-cliente label { font-weight: bold; color: #333; flex: 1; }
        .dados-cliente input { width: 100%; padding: 6px; border: 1px solid #aaa; border-radius: 4px; text-transform: uppercase; }
        .checklist { display: flex; flex-direction: column; gap: 15px; }
        .checklist-item { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        .checklist-item p { width: 40%; margin: 0; font-weight: bold; }
        
        /* Aumentamos a especificidade para garantir que o canvas apareça */
        .signature { margin-top: 30px; border-top: 2px solid #eee; padding-top: 15px; }
        #signatureCanvas { border: 2px solid #000; border-radius: 5px; width: 100%; max-width: 860px; height: 150px; background-color: #fff; touch-action: none; cursor: crosshair; }
        
        .button-group { text-align: center; margin-top: 20px; }
        button { background-color: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 16px; transition: background-color 0.3s; }
        button:hover { background-color: #0056b3; }
        a { display: inline-block; margin-top: 15px; text-decoration: none; color: #007bff; }
        @media print { button, a { display: none !important; } }
    </style>
</head>
<body>
    <header>
        <h1>Checklist de Processos Implantados Veiculos Novos</h1>
    </header>

    <div class="container">
        <h2>Checklist de Processos Veiculos Novos</h2>

        <div class="dados-cliente">
            <div class="linha">
                <label>Cliente:<br><input type="text" id="cliente" oninput="this.value = this.value.toUpperCase()"></label>
                <label>CNPJ:<br><input type="text" id="cnpj" placeholder="00.000.000/0000-00" oninput="formatarCNPJ(this)"></label>
            </div>
            <div class="linha">
                <label>Loja:<br><input type="text" id="loja" oninput="this.value = this.value.toUpperCase()"></label>
                <label>Ponto Focal:<br><input type="text" id="ponto" oninput="this.value = this.value.toUpperCase()"></label>
            </div>
            <label>Consultor(a) Dealernet:<br><input type="text" id="consultor" oninput="this.value = this.value.toUpperCase()"></label>
        </div>

        <div class="checklist" id="areaChecklist"></div>

        <div class="button-group">
            <button onclick="marcarTodas('sim')">Marcar Todas Sim</button>
            <button onclick="marcarTodas('nao')">Marcar Todas Não</button>
            <button onclick="marcarTodas('naoSeAplica')">Marcar Todas Não se Aplica</button>
        </div>

        <div class="signature">
            <h3>Assinatura</h3>
            <canvas id="signatureCanvas"></canvas>
            <br>
            <button type="button" onclick="limparAssinatura()" style="background-color: #dc3545; margin-top: 10px;">Limpar Assinatura</button>
        </div>

        <div class="button-group">
            <button onclick="validarEImprimir()">Impressão Módulo Veiculos Novos</button>
            <br>
            <a href="checklist1.html">Voltar para o Menu</a>
        </div>
    </div>

    <script>
        const checklistItems = [
            "Cadastro de Atendimento do Vendedor", "Cadastro de Veículo de Interesse do Cliente", "Simular Financiamento", "Cadastro de Proposta de Venda", "Cadastro de Serviços Adicionais", "Cadastro de Pessoa", "Simular Venda a Partir de Uma Proposta", "Aprovação de Proposta de Venda", "Impressão de Pedido (*)", "Liberação de Pedido para Faturamento", "Emitir NF de Venda (*)", "Emitir NF de Devolução de Venda (*)", "Emitir NF de Transferência de Veículos (*)", "Emitir NF de Remessa para Demonstração (*)", "Cadastro de Veículos", "Importar NF de Compra", "Cadastro de Preço de Modelo de Veículos", "Cadastro de Preço de Opcionais por Modelo", "Fotos de Veículos", "Retirar Veículo do Trânsito", "Avaliação de Usado", "Exportar Comprovante de Entrega", "Cadastrar NF de Simples Remessa (*)", "Reservar Veículos", "Bloquear Veículos para Venda", "Entrega de Veículo", "Comprovante de Entrega", "Veículos Entregues", "Inclusão de Valores Agregados", "Análise de Custo de Veículos", "Montagem de veículos", "Cadastrar test drive", "Criar pedido F&I", "Recepção de clientes", "Cadastrar Vendedor da vez", "Consultar estoque/comercialização", "Inventário de Veículos", "Cadastrar Documentos dinâmicos da Proposta e da avaliação", "Indicadores", "Integração com a Fábrica - Importações", "Integração com a Fábrica - Exportações", "Relatórios", "FLUXO - Atendimento Avaliação Usado - Autorizar NF", "FLUXO - Atendimento Avaliação Usado - Informar data entrada", "FLUXO - Entrega Veículo da Proposta - Agendar entrega de VN", "FLUXO - Entrega Veículo da Proposta - Autorizar Agendamento", "FLUXO - Entrega Veículo da Proposta - Liberar Entrega", "FLUXO - Entrega Veículo da Proposta - Contatar Cliente", "FLUXO - Entrega Veículo da Proposta - Entregar VN", "FLUXO - Proposta Reabertura - Dar Ciência", "FLUXO - Proposta de Veículo - Cash Convertion", "FLUXO - Proposta de Veículo - Autorizar VN", "FLUXO - Proposta de Veículo - Documentos", "FLUXO - Proposta de Veículo - Autorizar Faturamento", "FLUXO - Proposta de Veículo - Dar Ciência", "FLUXO - Proposta de Veículo - Emitir Transferência", "FLUXO - Proposta de Veículo - Emitir NF VN", "FLUXO - Test Drive de Veículos - Executar", "FLUXO - Test Drive de Veículos - Registrar Resultado", "FLUXO - Oferecer FeI na Proposta de Veículo - Ficha cadastral", "FLUXO - Oferecer FeI na Proposta de Veículo - Oferecer F&I 1", "FLUXO - Oferecer FeI na Proposta de Veículo - Oferecer F&I 2", "FLUXO - Oferecer FeI na Proposta de Veículo - Oferecer F&I 3", "FLUXO - Oferecer FeI na Proposta de Veículo - Oferecer F&I 4", "FLUXO - Oferecer FeI na Proposta de Veículo - Oferecer F&I 5", "FLUXO - Oferecer FeI na Proposta de Veículo - Concluir proposta", "FLUXO - Preparação da Proposta - Abrir OS", "FLUXO - Preparação da Proposta - Definir Prearação", "FLUXO - Reserva de Veículos - Autorizar"
        ];

        function formatarCNPJ(campo) {
            let cnpj = campo.value.replace(/\D/g, "");
            if (cnpj.length > 14) cnpj = cnpj.substring(0, 14);
            campo.value = cnpj.replace(/^(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})$/, "$1.$2.$3/$4-$5");
        }

        document.getElementById('areaChecklist').innerHTML = checklistItems.map(item => `
            <div class="checklist-item">
                <p>${item}</p>
                <label><input type="radio" name="${item}" value="sim"> Sim</label>
                <label><input type="radio" name="${item}" value="nao"> Não</label>
                <label><input type="radio" name="${item}" value="naoSeAplica"> N/A</label>
                <input type="text" placeholder="Observação">
            </div>
        `).join('');

        function marcarTodas(valor) {
            checklistItems.forEach(item => {
                document.getElementsByName(item).forEach(r => r.checked = r.value === valor);
            });
        }

        function validarEImprimir() {
            if (checklistItems.every(item => Array.from(document.getElementsByName(item)).some(r => r.checked))) {
                window.print();
            } else { alert('Por favor, responda todas as perguntas antes de imprimir.'); }
        }

        // LÓGICA DE ASSINATURA (INICIALIZADA APÓS O CARREGAMENTO TOTAL)
        window.addEventListener('load', () => {
            const canvas = document.getElementById('signatureCanvas');
            const ctx = canvas.getContext('2d');
            let desenhando = false;
            
            // Define o tamanho real para garantir que o desenho não fique distorcido
            canvas.width = canvas.offsetWidth;
            canvas.height = 150;

            ctx.strokeStyle = '#000'; ctx.lineWidth = 2; ctx.lineJoin = 'round';

            function getPos(e) {
                const rect = canvas.getBoundingClientRect();
                const clientX = e.clientX || (e.touches ? e.touches[0].clientX : 0);
                const clientY = e.clientY || (e.touches ? e.touches[0].clientY : 0);
                return { x: clientX - rect.left, y: clientY - rect.top };
            }

            canvas.addEventListener('mousedown', (e) => { desenhando = true; ctx.beginPath(); ctx.moveTo(getPos(e).x, getPos(e).y); });
            canvas.addEventListener('mousemove', (e) => { if (desenhando) { ctx.lineTo(getPos(e).x, getPos(e).y); ctx.stroke(); } });
            canvas.addEventListener('mouseup', () => desenhando = false);
            canvas.addEventListener('mouseleave', () => desenhando = false);
            canvas.addEventListener('touchstart', (e) => { e.preventDefault(); desenhando = true; ctx.beginPath(); ctx.moveTo(getPos(e).x, getPos(e).y); }, {passive: false});
            canvas.addEventListener('touchmove', (e) => { e.preventDefault(); if (desenhando) { ctx.lineTo(getPos(e).x, getPos(e).y); ctx.stroke(); } }, {passive: false});
            canvas.addEventListener('touchend', () => desenhando = false);

            window.limparAssinatura = () => ctx.clearRect(0, 0, canvas.width, canvas.height);
        });
    </script>
</body>
</html>
