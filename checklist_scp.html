<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checklist de Processos Implantados</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f5f5f5; margin: 0; padding: 0; }
        header { background-color: #007bff; color: white; text-align: center; padding: 15px 0; }
        h2 { color: #333; text-align: center; margin-top: 20px; }
        .container { max-width: 900px; margin: 20px auto; padding: 20px; background-color: white; border-radius: 8px; box-shadow: 0 0 15px rgba(0, 0, 0, 0.1); }
        
        .dados-cliente { display: flex; flex-direction: column; gap: 10px; margin-bottom: 25px; text-align: left; }
        .dados-cliente .linha { display: flex; gap: 20px; }
        .dados-cliente label { font-weight: bold; color: #333; display: flex; flex-direction: column; flex: 1; }
        .dados-cliente input { padding: 6px; border: 1px solid #aaa; border-radius: 4px; text-transform: uppercase; }

        .checklist { display: flex; flex-direction: column; gap: 15px; }
        .checklist-item { display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .checklist-item p { width: 40%; margin: 0; font-weight: bold; }
        .checklist-item label { margin-right: 15px; font-size: 14px; }
        .observacao { padding: 4px; border: 1px solid #ccc; border-radius: 4px; width: 150px; }

        .signature { margin-top: 30px; }
        .signature canvas { border: 1px solid #ccc; border-radius: 5px; width: 100%; height: 150px; background-color: #fff; cursor: crosshair; touch-action: none; }
        
        /* Estilos da Foto - Apenas incluídos */
        .foto-container { margin-top: 20px; display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
        #video { width: 150px; height: 150px; background: #eee; border-radius: 5px; object-fit: cover; }
        #fotoCapturada { width: 150px; height: 150px; border: 1px solid #ccc; border-radius: 5px; }
        
        .button-group { text-align: center; margin-top: 20px; }
        button { background-color: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 16px; transition: 0.3s; margin: 5px; }
        button:hover { background-color: #0056b3; }
        .btn-whatsapp { background-color: #25D366; }
        .btn-whatsapp:hover { background-color: #128C7E; }

        @media print {
            .button-group, .btn-clear, a, .btn-foto, #video { display: none !important; }
            input { border: 1px solid #000 !important; }
        }
    </style>
</head>
<body>
    <header>
        <h1>Checklist de Processos Implantados Contas a Pagar</h1>
    </header>

    <div class="container">
        <h2>Checklist de Processos Contas a Pagar</h2>

        <div class="dados-cliente">
            <div class="linha">
                <label>Cliente:<br>
                    <input type="text" id="cliente" placeholder="Nome do cliente" oninput="this.value = this.value.toUpperCase()">
                </label>
                <label>CNPJ:<br>
                    <input type="text" id="cnpj" placeholder="00.000.000/0000-00" oninput="formatarCNPJ(this)">
                </label>
            </div>
            <div class="linha">
                <label>Loja:<br>
                    <input type="text" id="loja" placeholder="Loja" oninput="this.value = this.value.toUpperCase()">
                </label>
                <label>Ponto Focal:<br>
                    <input type="text" id="ponto" placeholder="Ponto Focal" oninput="this.value = this.value.toUpperCase()">
                </label>
            </div>
            <div class="linha">
                <label>Consultor(a) Dealernet:<input type="text" id="responsavel" placeholder="Nome do Consultor" oninput="this.value = this.value.toUpperCase()"></label>
            </div>
        </div>

        <div class="checklist">
            <!-- Gerado dinamicamente -->
        </div>

        <div class="button-group">
            <button onclick="marcarTodas('sim')">Marcar Todas Sim</button>
            <button onclick="marcarTodas('nao')">Marcar Todas Não</button>
            <button onclick="marcarTodas('naoSeAplica')">Marcar Todas Não se Aplica</button>
        </div>

        <div class="signature">
            <h3>Assinatura</h3>
            <canvas id="signatureCanvas"></canvas>
            <div style="text-align: right;">
                <button class="btn-clear" style="background:#666; font-size:12px; padding:5px 10px;" onclick="limparAssinatura()">Limpar Assinatura</button>
            </div>
        </div>

        <!-- Inclusão da Funcionalidade de Foto -->
        <div class="foto-container">
            <div>
                <video id="video" autoplay playsinline></video><br>
                <button type="button" class="btn-foto" onclick="ligarCamera()">Ligar Câmera</button>
                <button type="button" class="btn-foto" onclick="tirarFoto()">Capturar Foto</button>
            </div>
            <img id="fotoCapturada" alt="Foto capturada">
            <canvas id="canvasFoto" width="300" height="300" style="display:none;"></canvas>
        </div>

        <div class="button-group">
            <button onclick="validarEImprimir()">Impressão Módulo Produtos</button>
            <br>
            <a href="checklist1.html">Voltar para o Menu</a>
        </div>
    </div>

    <script>
        const checklistItems = [
            "Cadastro de Pessoa", "Cadastro e Movimentação de Obrigações", "Devedores Diversos (Controla Adiant. Fornecedores)", 
            "Encontro de Contas", "Informar/Retirar Faturas", "N. F. de Entrada Diversas", "Pagamento do Dia", 
            "Cadastro de pagamento eletrônico", "Relatórios", "Integração com a Fábrica - Importações", 
            "Integração com a Fábrica - Exportações", "FLUXO - Autorizar Título Movimento - Autorizar", 
            "FLUXO - Autorizar Título Movimento - Dar Ciência", "FLUXO - Encontro de Contas - Dar Ciência", 
            "FLUXO - Encontro de Contas - Autorizar", "FLUXO - Titulo Avulso - Validar", "FLUXO - Titulo Avulso - Autorizar", 
            "FLUXO - Titulo Avulso - Dar Ciência", "FLUXO - Ficha Razão Avulso - Autorizar", 
            "FLUXO - Prorroga Título - Autorizar", "FLUXO - Prorroga Título - Dar Ciência"
        ];

        function generateChecklistItems() {
            return checklistItems.map(item => `
                <div class="checklist-item">
                    <p>${item}</p>
                    <label><input type="radio" name="${item}" value="sim"> Sim</label>
                    <label><input type="radio" name="${item}" value="nao"> Não</label>
                    <label><input type="radio" name="${item}" value="naoSeAplica"> Não se aplica</label>
                    <input type="text" class="observacao" id="obs_${item}" placeholder="Observação">
                </div>
            `).join('');
        }
        document.querySelector('.checklist').innerHTML = generateChecklistItems();

        // Funções Câmera
        async function ligarCamera() { try { const stream = await navigator.mediaDevices.getUserMedia({ video: true }); document.getElementById('video').srcObject = stream; } catch(err) { alert("Erro ao acessar câmera: " + err); } }
        function tirarFoto() { const v = document.getElementById('video'); const c = document.getElementById('canvasFoto'); const ctx = c.getContext('2d'); ctx.drawImage(v, 0, 0, 300, 300); document.getElementById('fotoCapturada').src = c.toDataURL('image/png'); }

        // Assinatura
        const canvas = document.getElementById('signatureCanvas'); const ctx = canvas.getContext('2d'); let desenhando = false;
        function ajustarCanvas() { canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight; }
        window.onload = ajustarCanvas;
        function getPos(e) { const rect = canvas.getBoundingClientRect(); const clientX = e.touches ? e.touches[0].clientX : e.clientX; const clientY = e.touches ? e.touches[0].clientY : e.clientY; return { x: clientX - rect.left, y: clientY - rect.top }; }
        canvas.addEventListener('mousedown', (e) => { desenhando = true; ctx.beginPath(); const p = getPos(e); ctx.moveTo(p.x, p.y); });
        canvas.addEventListener('mousemove', (e) => { if (!desenhando) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); });
        canvas.addEventListener('mouseup', () => desenhando = false);
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); desenhando = true; ctx.beginPath(); const p = getPos(e); ctx.moveTo(p.x, p.y); });
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); if (!desenhando) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); });
        function limparAssinatura() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

        function formatarCNPJ(campo) { let cnpj = campo.value.replace(/\D/g, ""); if (cnpj.length > 14) cnpj = cnpj.substring(0, 14); campo.value = cnpj.replace(/^(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})$/, "$1.$2.$3/$4-$5"); }
        function marcarTodas(valor) { checklistItems.forEach(item => { document.getElementsByName(item).forEach(r => { if(r.value === valor) r.checked = true; }); }); }
        function validarEImprimir() { const allAnswered = checklistItems.every(item => Array.from(document.getElementsByName(item)).some(r => r.checked)); if (allAnswered) { window.print(); } else { alert('Por favor, responda todas as perguntas antes de imprimir.'); } }
    </script>
</body>
</html>
