<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checklist de Processos Implantados</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f5f5f5; margin: 0; padding: 0; }
        header { background-color: #007bff; color: white; text-align: center; padding: 15px 0; }
        h2 { color: #333; text-align: center; margin-top: 20px; }
        .container { max-width: 900px; margin: 20px auto; padding: 20px; background-color: white; border-radius: 8px; box-shadow: 0 0 15px rgba(0, 0, 0, 0.1); }
        .dados-cliente { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .linha { display: flex; gap: 20px; }
        .dados-cliente label { display: flex; flex-direction: column; font-weight: bold; }
        .dados-cliente input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; text-transform: uppercase; }
        .checklist { display: flex; flex-direction: column; gap: 15px; }
        .checklist-item { display: flex; align-items: center; justify-content: space-between; }
        .checklist-item p { width: 40%; margin: 0; font-weight: bold; }
        .signature { margin-top: 30px; }
        .signature canvas { border: 1px solid #ccc; border-radius: 5px; width: 100%; height: 150px; cursor: crosshair; }
        .button-group { text-align: center; margin-top: 20px; }
        button { background-color: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #0056b3; }
        a { display: inline-block; margin-top: 15px; text-decoration: none; color: #007bff; }
        @media print { button, a { display: none !important; } }
    </style>
</head>
<body>
    <header>
        <h1>Checklist de Processos Implantados Tesouraria</h1>
    </header>

    <div class="container">
        <h2>Checklist de Processos Tesouraria</h2>

        <div class="dados-cliente">
            <div class="linha">
                <label>Cliente:<br><input type="text" id="cliente" oninput="this.value = this.value.toUpperCase()"></label>
                <label>CNPJ:<br><input type="text" id="cnpj" placeholder="00.000.000/0000-00" oninput="formatarCNPJ(this)"></label>
            </div>
            <div class="linha">
                <label>Loja:<br><input type="text" id="loja" oninput="this.value = this.value.toUpperCase()"></label>
                <label>Ponto Focal:<br><input type="text" id="ponto" oninput="this.value = this.value.toUpperCase()"></label>
            </div>
            <label>Consultor(a) Dealernet:<br><input type="text" id="responsavel" oninput="this.value = this.value.toUpperCase()"></label>
        </div>

        <div class="checklist" id="areaChecklist"></div>

        <div class="button-group">
            <button onclick="marcarTodas('sim')">Marcar Todas Sim</button>
            <button onclick="marcarTodas('nao')">Marcar Todas Não</button>
            <button onclick="marcarTodas('naoSeAplica')">Marcar Todas Não se Aplica</button>
        </div>

        <div class="signature">
            <h3>Assinatura</h3>
            <canvas id="signatureCanvas" width="860" height="150"></canvas>
            <button type="button" onclick="limparAssinatura()" style="background-color: #dc3545; margin-top: 10px;">Limpar Assinatura</button>
        </div>

        <div class="button-group">
            <button onclick="validarEImprimir()">Impressão Módulo Tesouraria</button>
            <br>
            <a href="checklist1.html">Voltar para o Menu</a>
        </div>
    </div>

    <script>
        const checklistItems = [
            "Cadastro de Talões de Cheque", "Fechamento de Caixa", "Lançamentos",
            "Conciliação de Lançamentos (Caixa/Banco)", "Emitir Recibo (*)", "Negociação",
            "Importar Extrato de Conta", "Preparar / Emitir (Cheque/Borderô)",
            "Impressão de Extrato de Conta", "SITEF Implantado", "Relatórios",
            "FLUXO - Preparar Pagamento (PagTransf) - Autorizar", "FLUXO - Preparar Pagamento (PagTransf) - Dar Ciência",
            "FLUXO - Preparar Pagamento (PagTransf) - Emitir", "FLUXO - Preparar Pagamento (PagTransf) - Confirmar",
            "FLUXO - Preparar Pagamento (PagTransf) - importar Retorno", "FLUXO - Negociação - Autorizar",
            "FLUXO - Negociação - Confirmar", "FLUXO - Recebimento no caixa - Receber Pagamento",
            "FLUXO - Emitir Recibo (*) - Emitir Recibo (*)", "FLUXO - Emitir Recibo (*) - Autorizar",
            "FLUXO - Emitir Recibo (*) - Imprimir"
        ];

        function formatarCNPJ(campo) {
            let cnpj = campo.value.replace(/\D/g, "");
            if (cnpj.length > 14) cnpj = cnpj.substring(0, 14);
            campo.value = cnpj.replace(/^(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})$/, "$1.$2.$3/$4-$5");
        }

        function generateChecklistItems() {
            return checklistItems.map(item => `
                <div class="checklist-item">
                    <p>${item}</p>
                    <label><input type="radio" name="${item}" value="sim"> Sim</label>
                    <label><input type="radio" name="${item}" value="nao"> Não</label>
                    <label><input type="radio" name="${item}" value="naoSeAplica"> N/A</label>
                    <input type="text" placeholder="Obs">
                </div>
            `).join('');
        }

        document.getElementById('areaChecklist').innerHTML = generateChecklistItems();

        function marcarTodas(valor) {
            checklistItems.forEach(item => {
                document.getElementsByName(item).forEach(r => r.checked = r.value === valor);
            });
        }

        function validarEImprimir() {
            if (checklistItems.every(item => Array.from(document.getElementsByName(item)).some(r => r.checked))) {
                window.print();
            } else { alert('Responda todas as perguntas!'); }
        }

        // LÓGICA DA ASSINATURA
        const canvas = document.getElementById('signatureCanvas');
        const ctx = canvas.getContext('2d');
        let desenhando = false;
        ctx.strokeStyle = '#000'; ctx.lineWidth = 2; ctx.lineJoin = 'round';

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.clientX || (e.touches ? e.touches[0].clientX : 0);
            const clientY = e.clientY || (e.touches ? e.touches[0].clientY : 0);
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        canvas.addEventListener('mousedown', (e) => { desenhando = true; ctx.beginPath(); ctx.moveTo(getPos(e).x, getPos(e).y); });
        canvas.addEventListener('mousemove', (e) => { if (desenhando) { ctx.lineTo(getPos(e).x, getPos(e).y); ctx.stroke(); } });
        canvas.addEventListener('mouseup', () => desenhando = false);
        canvas.addEventListener('mouseleave', () => desenhando = false);
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); desenhando = true; ctx.beginPath(); ctx.moveTo(getPos(e).x, getPos(e).y); }, {passive: false});
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); if (desenhando) { ctx.lineTo(getPos(e).x, getPos(e).y); ctx.stroke(); } }, {passive: false});
        canvas.addEventListener('touchend', () => desenhando = false);

        function limparAssinatura() { ctx.clearRect(0, 0, canvas.width, canvas.height); }
    </script>
</body>
</html>
